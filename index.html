<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "@vercel/speed-insights": "./node_modules/@vercel/speed-insights/dist/index.mjs"
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Lista de Tarefas</h1>
        
        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Digite uma nova tarefa..."
                aria-label="Nova tarefa"
            >
            <select id="prioritySelect" aria-label="Prioridade da tarefa">
                <option value="baixa">Baixa</option>
                <option value="media" selected>Média</option>
                <option value="alta">Alta</option>
            </select>
            <button id="addTaskBtn">Adicionar</button>
        </div>
        
        <ul id="taskList" class="task-list"></ul>
    </div>

    <script type="module" src="script.js"></script>
    <!-- Vercel Speed Insights -->
    <script type="module" src="speed-insights.js"></script>
</body>
</html>
